[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kicad-captouch"
version = "0.1.0"
description = "Parametric generator for capacitive-touch interface footprints (sliders, wheels, XY pads) for KiCad"
readme = "README.md"
requires-python = ">=3.10"
license = "GPL-3.0-or-later"
license-files = ["LICENSE"]
authors = [{ name = "Ciro Caputo Viglione" }]
keywords = ["kicad", "capacitive-touch", "footprint", "pcb", "eda", "slider", "trackpad"]

[project.optional-dependencies]
dev = ["pytest>=7"]

[project.scripts]
captouch-spike = "captouch.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/captouch"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
