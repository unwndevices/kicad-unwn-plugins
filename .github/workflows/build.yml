name: build-binaries

# Build the standalone `captouch` binary on each OS. PyInstaller cannot
# cross-compile, so every target builds on its own runner. Runs on demand and on
# PRs that touch packaging; release.yml calls it (workflow_call) on version tags,
# so it does NOT trigger on tags itself — that would build the binaries twice.
on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    paths:
      - "packaging/**"
      - ".github/workflows/build.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "packages/kicad-captouch/**"

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.12"

      # Headless Qt (offscreen) on Linux still dlopens a few base libraries.
      - name: Install Qt runtime libs (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libxcb-cursor0 libdbus-1-3

      # The packaging group pulls in the GUI + PyInstaller toolchain on top of the
      # editable workspace (see the root pyproject's [dependency-groups]).
      - name: Install workspace + packaging extra
        run: uv sync --group packaging

      - name: Build binary
        run: uv run pyinstaller packaging/captouch.spec --noconfirm --distpath dist --workpath build/pyi

      - name: Smoke test (Linux / macOS)
        if: runner.os != 'Windows'
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          ./dist/captouch --version
          ./dist/captouch slider --list-presets
          ./dist/captouch trackpad --list-fab-profiles
          ./dist/captouch gui --check

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          .\dist\captouch.exe --version
          .\dist\captouch.exe slider --list-presets
          .\dist\captouch.exe trackpad --list-fab-profiles
          .\dist\captouch.exe gui --check

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: captouch-${{ matrix.os }}
          path: |
            dist/captouch
            dist/captouch.exe
          if-no-files-found: error
