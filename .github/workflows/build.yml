name: build-binaries

# Build the standalone `captouch` binary on each OS. PyInstaller cannot
# cross-compile, so every target builds on its own runner. Triggered on version
# tags (release artifacts), on demand, and on PRs that touch packaging.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
  pull_request:
    paths:
      - "packaging/**"
      - ".github/workflows/build.yml"
      - "pyproject.toml"
      - "src/**"

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Headless Qt (offscreen) on Linux still dlopens a few base libraries.
      - name: Install Qt runtime libs (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libxcb-cursor0 libdbus-1-3

      - name: Install package + packaging extra
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[packaging]"

      - name: Build binary
        run: pyinstaller packaging/captouch.spec --noconfirm --distpath dist --workpath build/pyi

      - name: Smoke test (Linux / macOS)
        if: runner.os != 'Windows'
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          ./dist/captouch --version
          ./dist/captouch slider --list-presets
          ./dist/captouch trackpad --list-fab-profiles
          ./dist/captouch gui --check

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          .\dist\captouch.exe --version
          .\dist\captouch.exe slider --list-presets
          .\dist\captouch.exe trackpad --list-fab-profiles
          .\dist\captouch.exe gui --check

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: captouch-${{ matrix.os }}
          path: |
            dist/captouch
            dist/captouch.exe
          if-no-files-found: error
