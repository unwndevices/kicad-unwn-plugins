name: ci

# Lint, type-check, and test on every push and pull request. The binary
# packaging lives in build.yml; this is the fast quality gate.
on:
  push:
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    name: lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The GUI tests instantiate Qt widgets headlessly; offscreen Qt still
      # dlopens a few base libraries (mirrors build.yml).
      - name: Install Qt runtime libs
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libxcb-cursor0 libdbus-1-3

      - name: Install package + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Mypy
        run: mypy

      # kicad-cli is not installed on the runner, so the DRC/render tests in
      # test_kicad_cli.py skip themselves; the rest of the suite still runs.
      - name: Pytest (with coverage)
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q --cov=captouch --cov-report=term-missing
