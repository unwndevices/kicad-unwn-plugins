[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kicad-returnpath"
version = "0.1.0"
description = "Geometric current-return-path checker for KiCad PCBs (split-crossing / plane-edge / return-via)"
readme = "README.md"
requires-python = ">=3.10"
license = "GPL-3.0-or-later"
license-files = ["LICENSE"]
authors = [{ name = "Ciro Caputo Viglione" }]
keywords = ["kicad", "pcb", "drc", "return-path", "signal-integrity", "eda"]
dependencies = ["shapely>=2.0", "kicad-core"]

[project.optional-dependencies]
dev = ["pytest>=7", "pytest-cov>=4", "ruff>=0.6", "mypy>=1.8"]

[project.scripts]
return-path = "returnpath.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/returnpath"]
